<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - Fantasytoca</title>
    
    <!-- Fontes e Ícones Premium do Lucide -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Carregamento do Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: {
                  purple: '#000000',
                  light: '#f8f9fa'
                }
              },
              fontFamily: {
                sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                display: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              }
            }
          }
        }
    </script>
    <style>
        body {
          font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-black antialiased min-h-screen flex flex-col justify-center items-center p-6 selection:bg-black/10 selection:text-black">

    <!-- Contêiner principal do formulário de login -->
    <main class="w-full max-w-sm space-y-6">
        
        <!-- Link de retorno -->
        <div class="text-center relative z-50">
            <a href="index.html" class="inline-flex items-center gap-2 text-xs font-semibold text-gray-500 hover:text-black transition-all">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                <span>Voltar para a Página Inicial</span>
            </a>
        </div>

        <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 space-y-6">
            
            <!-- Ilustração e logotipo da marca com texto sobreposto de forma harmoniosa -->
            <div class="relative w-72 h-72 mx-auto flex flex-col justify-center items-center transform -translate-y-[35%] -mb-16">
                <!-- Logotipo ampliado ao fundo e posicionado com foco visual (aumentado em mais 20% e deslocado 20% para baixo) -->
                <img alt="Fantasytoca Logo" class="absolute inset-0 w-full h-full object-contain pointer-events-none transition-all duration-300 transform scale-[1.2] translate-y-[20%] opacity-90 z-0" src="imagens/Logo.png" onerror="this.src='https://lh3.googleusercontent.com/aida/ADBb0uhmTUFLI4cmZoRMZBduuSkZSEYO9cDd8QQGWanFIwZN2n4isdDNJoHhbitVVaKmnxsls89pS-ey1yRF1ESVXLzFF7zGwR3wlr2l4CH7Fk0a6Bj_sfk822uKiai9oTZTIVLnUfdZ1ezwPoiezmToDceXpg-mH72w_4HZD8hAt7V3ysaNpuDsvZbrQx2XXDQ3loLXwwOuUzn51kfIoWsCrW4aSe2HJY3p-BIhUg_kszkzpvmE3zNs-UHf'"/>
                
                <!-- Texto elegante que se posiciona sobre as áreas transparentes da logo quadrada, garantindo leitura perfeita -->
                <div class="relative z-10 text-center bg-white/75 backdrop-blur-[1px] px-3.5 py-2 rounded-xl border border-white/40 shadow-sm space-y-0.5 mt-auto mb-4">
                    <h2 class="font-display text-[16px] font-extrabold text-gray-900 tracking-tight leading-tight">Área Administrativa</h2>
                    <p class="text-[10px] font-extrabold text-black uppercase tracking-widest leading-none">Acesso FestaSys</p>
                </div>
            </div>

            <!-- Estrutura de envio do formulário de login -->
            <form id="form-login" class="space-y-5">
                
                <!-- Entrada de Identificação/Nome do Usuário -->
                <div class="space-y-2 text-left">
                    <label for="usuario" class="block text-[11px] font-extrabold text-gray-500 uppercase tracking-widest">
                        Nome:
                    </label>
                    <div class="relative">
                        <i data-lucide="user" class="w-[18px] h-[18px] text-gray-400 absolute left-4 top-1/2 -translate-y-1/2"></i>
                        <input 
                            type="text" 
                            id="usuario" 
                            placeholder="Nome" 
                            required 
                            autocomplete="username" 
                            class="w-full h-12 pl-12 pr-4 border border-gray-200 rounded-xl text-sm font-semibold text-gray-700 placeholder:text-gray-300 outline-none focus:ring-2 focus:ring-black/10 focus:border-black transition-all bg-white"
                        />
                    </div>
                </div>

                <!-- Entrada da Senha -->
                <div class="space-y-2 text-left">
                    <label for="senha" class="block text-[11px] font-extrabold text-gray-500 uppercase tracking-widest">
                        Senha:
                    </label>
                    <div class="relative">
                        <i data-lucide="key" class="w-[18px] h-[18px] text-gray-400 absolute left-4 top-1/2 -translate-y-1/2"></i>
                        <input 
                            type="password" 
                            id="senha" 
                            placeholder="••••••••" 
                            required 
                            autocomplete="current-password" 
                            class="w-full h-12 pl-12 pr-4 border border-gray-200 rounded-xl text-sm font-semibold text-gray-700 placeholder:text-gray-300 outline-none focus:ring-2 focus:ring-black/10 focus:border-black transition-all bg-white"
                        />
                    </div>
                </div>

                <!-- Gatilho de Envio do Formulário -->
                <button 
                    type="submit" 
                    class="w-full bg-white hover:bg-gray-50 border-2 border-black transition-all text-black font-extrabold h-12 rounded-xl hover:shadow hover:shadow-black/5 text-sm flex items-center justify-center gap-2 cursor-pointer mt-3"
                >
                    <i data-lucide="lock-keyhole" class="w-4 h-4 text-black"></i>
                    <span>Entrar no Painel</span>
                </button>

            </form>

            <!-- Dica informativa com as Credenciais de Teste -->
            <div class="bg-gray-50 rounded-xl p-4 border border-gray-100 text-center text-[11.5px] text-gray-400 leading-relaxed font-semibold">
                🔑 <span class="text-black uppercase font-extrabold text-[10px] tracking-wider">Acesso de Teste:</span><br>
                Nome: <strong class="text-gray-700">nome</strong> &nbsp;|&nbsp; Senha: <strong class="text-gray-700">senha</strong>
            </div>

        </div>

        <div class="text-center text-[10px] text-gray-400">
            © 2026 Fantasytoca Aluguel. Projeto Beta 1.0. Todos os direitos reservados.
        </div>
    </main>

    <!-- Integração do Script Principal -->
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            lucide.createIcons();
        });
    </script>
</body>
</html>
